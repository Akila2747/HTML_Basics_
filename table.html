<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table,th,td{
            border: 3px double;
            border-collapse: collapse;
            padding: 30px;
            background-color: bisque;
        }

    </style>
</head>
<body>
    <table>
        <caption style="font-size: xx-large;">TIME TABLE</caption>
        <thead style="text-align: center;">
            <tr>
                <th>Day</th>
                <th>1</th>
                <th>2</th>
                <th>3</th>
                <th rowspan="6">Lunch Break</th>
                <th>4</th>
                <th>5</th>
            </tr>
            <tr>
                <th>Monday</th>
                <td>Tamil</td>
                <td>Math</td>
                <td>English</td>
                <td>Social</td>
                <td rowspan="2">Science</td>
            </tr>
            <tr>
                <th>Tuesday</th>
                <td>Math</td>
                <td>English</td>
                <td>Social</td>
                <td>Tamil</td>
            </tr>
            <tr>
                <th>Wednesday</th>
                <td>English</td>
                <td rowspan="2">Tamil</td>
                <td>Social</td>
                <td>Science</td>
                <td>Math</td>
            </tr>
            <tr>
                <th>Thursday</th>
                <td>Social</td>
                <td>Math</td>
                <td>English</td>
                <td>Science</td>
            </tr>
            <tr>
                <th>Friday</th>
                <td colspan="2">Math</td>
                <td>Tamil</td>
                <td>Science</td>
                <td>Social</td>
            </tr>

        </thead>
    </table>
</body>
</html>
