<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Form</title>
</head>
<body>
    <center>
    <fieldset style="width: fit-content; ">
        <legend style="font-size: large;"><strong>Sign Up</strong></legend>
        <br>
        <form action="Form.html">
            <label>Name:</label>
            <input type="text" placeholder="First Name">
            <br>
            <br>
            <label>DOB:</label>
            <input type="date">
            <br>
            <br>
            <label>Email id:</label>
            <input type="text" placeholder="abc@gmail.com">
            <br>
            <br>
            <label>Password:</label>
            <input type="password" required placeholder="Minimum 6 characters required">
            <br><br>
            <input type="radio" name="gender">
            <label>Male</label>
            <input type="radio" name="gender">
            <label>Female</label>
            <input type="radio" name="gender">
            <label>Others</label>
            <br>
            <br>
            <input type="checkbox">
            <label>Terms and conditions</label>
            <br>
            <br>
            <input type="submit">
        </form>
    </fieldset>
    </center>
</body>
</html>
